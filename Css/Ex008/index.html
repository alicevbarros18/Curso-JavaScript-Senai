<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Box</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        #container {
            background-color: rgb(0, 89, 255);
            display: flex;
            flex-direction: row;

        }

        p {
            background-color: rgb(115, 204, 255);
            margin: 20px;
            padding: 10px;
            width: 0px;
            /*Largura*/
            height: 0px;
            /*Altura*/
        }
    </style>

</head>

<body>

    <!--Precisamos adicionar o display: flx; no Containe-> PAI DOS ELEMENTOS -->
    <!--Essa div é uma"Section" e o Container é "Noticias" -->

    <div id="container">
        <p>A</p>
        <p>B</p>
        <p>C</p>
    </div>
</body>

</html>
