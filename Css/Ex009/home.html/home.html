<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <style>
        *{
            box-sizing: content-box;
            margin: 0;
            padding: 0;
        }
        header{
            background-color: aquamarine;
            display: flex;
            justify-content: space-between;
            font-size: 24px;
            height:100px;
            align-items: center;
        }

        nav{
            background-color: rgb(0, 255, 85);
            width: 350px;
        }

        ul{
            display: flex;
            list-style-type: none;
            justify-content: space-around;
        }

        section{
            background-color: rgb(48, 133, 104);
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #card{
            background-color: blue;
            width: 100px;
            height: 100px;
            color: blueviolet;
            font-size: large;
            display: flex;
            justify-content: center;
            align-items: center;

        }
    </style>
</head>
<body>
    <header>
        <div>
            LOGO
        </div>
        <nav>
            <ul>
                <li><a href="https://www.palmeiras.com.br/">Home</li>
                <li>Produtos</li>
                <li>Contato</li>
                <li>Sobre</li>
            </ul>
        </nav>
    </header>

    <section>
        <div>
            Noticias
        </div>
    </section>

</body>
</html>
